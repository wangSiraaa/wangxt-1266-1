server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: invoice-risk-investigation

  datasource:
    url: jdbc:postgresql://localhost:5432/invoice_risk_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: "invoice-risk-investigation-secret-key-2024-please-change-this-in-production-env"
    expiration: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
